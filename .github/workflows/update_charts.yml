name: Deploy Dashboard

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  push:
    branches: ["main"]
  workflow_dispatch:     # Manual run button

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas curl_cffi matplotlib pandas numpy

      - name: Generate Data
        run: python iran.py

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root (index.html, daily_data.json, etc.)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4