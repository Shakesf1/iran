name: Strait of Hormuz Monitor

on:
  schedule:
    # Runs at :05 and :35 of every hour
    - cron: '5,35 * * * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  track_vessels:
    runs-on: ubuntu-latest
    # Permissions needed to commit the DB back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Removed libgconf-2-4, added modern dependencies for Ubuntu 24.04
          sudo apt-get install -y \
            xvfb \
            libxi6 \
            libxrender1 \
            libxtst6 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxss1 \
            libasound2t64 \
            google-chrome-stable

      - name: Install Python Packages
        run: |
          pip install DrissionPage

      - name: Random Delay (Jitter)
        run: |
          DELAY=$((1 + RANDOM % 480))
          echo "Waiting for $DELAY seconds..."
          sleep $DELAY

      - name: Run Shipping Monitor
        env:
          DISPLAY: :99
        run: |
          #          1. Force kill any existing chrome or xvfb processes
          pkill -9 chrome || true
          pkill -9 chromium || true
          pkill -9 Xvfb || true
          
          # 2. Clear out temp user profiles to prevent "Profile in Use" errors
          rm -rf /tmp/.com.google.Chrome.* || true
          rm -rf /tmp/.org.chromium.Chromium.* || true
          
          # 3. Start the virtual display
          Xvfb :99 -screen 0 1920x1080x24 &
          
          # 4. Wait a moment for Xvfb to initialize
          sleep 4

          python -u shipping.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 1. Fetch the latest state without merging yet
          git fetch origin main

          # 2. FORCE Git to accept the remote versions of the data files
          # This clears the "untracked files would be overwritten" error
          git checkout origin/main -- shipping_data.db dashboard_stats.json || true

          # 3. Now pull and rebase safely
          git pull --rebase --autostash origin main 

          # 4. Add the fresh data generated by the script
          git add shipping_data.db dashboard_stats.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update shipping data and dashboard [skip ci]"
            git push origin main
          fi