<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iran Strategic Monitor - Bloc Analysis</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
    <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Strategic Bloc Monitor</h1>
            <p class="text-slate-500 text-sm italic">Real-time cost and casualty tracking</p>
        </div>
        <div class="flex items-center gap-3">
            <div id="status-dot" class="h-3 w-3 rounded-full bg-green-500 animate-pulse"></div>
            <div class="bg-white border p-3 rounded-lg shadow-sm">
                <div class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Latest API Update</div>
                <div id="update-tag" class="text-sm font-mono font-bold text-slate-700">Syncing...</div>
            </div>
        </div>
    </header>

        <div id="bloc-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            </div>

        <div class="grid grid-cols-1 gap-8 mb-12">
            <section class="bg-white p-6 rounded-xl border shadow-sm">
                <h3 class="font-bold mb-4">Daily Iran Launch Volume</h3>
                <div id="dailyChart" class="h-80"></div>
            </section>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section class="bg-white p-6 rounded-xl border shadow-sm">
                <h3 class="font-bold mb-4">Cumulative Casualties (Both Blocs)</h3>
                <div id="casualtyChart" class="h-80"></div>
            </section>
            <section class="bg-white p-6 rounded-xl border shadow-sm">
                <h3 class="font-bold mb-4">Defense Performance (% Intercepted)</h3>
                <div id="performanceChart" class="h-80"></div>
            </section>
        </div>
    </div>

    <script>
    async function init() {
        const histRes = await fetch('./daily_summary_history.json');
        const dailyRes = await fetch('./daily_data.json');
        const histData = await histRes.json();
        const dailyData = await dailyRes.json();

        if (!histData.length) return;

        // --- THE FIX IS HERE ---
        // 1. Identify the most recent timestamp in the file
        const latestTs = histData[histData.length - 1].asOf;
        
        // 2. Filter data so we ONLY look at that specific point in time
        const currentSnapshot = histData.filter(d => d.asOf === latestTs);
        
        // Display the timestamp
        document.getElementById('update-tag').innerText = new Date(latestTs).toLocaleString();

        const blocs = ["US/Israel Bloc", "Iran-Led Bloc"];
        const blocHtml = blocs.map(b => {
            // 3. Sum only the members of the CURRENT snapshot
            const members = currentSnapshot.filter(m => m.bloc === b);
            
            const totals = members.reduce((acc, c) => ({
                l: acc.l + (c.launched || 0), 
                i: acc.i + (c.intercepted || 0), 
                h: acc.h + (c.hits || 0),
                m: acc.m + (c.mil_cas || 0), 
                c: acc.c + (c.civ_cas || 0)
            }), {l:0, i:0, h:0, m:0, c:0});
            
            const rate = totals.l > 0 ? ((totals.i / totals.l) * 100).toFixed(1) : 0;

            return `
                <div class="bg-white p-6 rounded-xl border-l-4 ${b.includes('US') ? 'border-blue-500' : 'border-red-500'} shadow-sm">
                    <h2 class="text-xl font-bold mb-4">${b}</h2>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>Launched: <span class="font-bold">${totals.l.toLocaleString()}</span></div>
                        <div>Intercepted: <span class="font-bold">${totals.i.toLocaleString()}</span></div>
                        <div class="text-orange-600">Hits Taken: <span class="font-bold">${totals.h.toLocaleString()}</span></div>
                        <div class="text-green-600">Intercept Rate: <span class="font-bold">${rate}%</span></div>
                        <div class="border-t pt-2 mt-2 col-span-2 flex justify-between">
                            <span>Military Cas: <b>${totals.m.toLocaleString()}</b></span>
                            <span>Civilian Cas: <b>${totals.c.toLocaleString()}</b></span>
                        </div>
                    </div>
                </div>`;
        }).join('');
        
        document.getElementById('bloc-container').innerHTML = blocHtml;

            // 3. CHART DATA PREP (Sorting dates ensures lines don't zig-zag)
            const dates = [...new Set(histData.map(d => d.date))].sort();

            // Casualty Trend
            const casualtyTraces = blocs.map(b => ({
                x: dates,
                y: dates.map(d => histData.filter(x => x.date === d && x.bloc === b).reduce((a,c) => a + (c.mil_cas || 0) + (c.civ_cas || 0), 0)),
                name: b, type: 'scatter', fill: 'tozeroy', line: { shape: 'spline' }
            }));
            Plotly.newPlot('casualtyChart', casualtyTraces, { margin: {t:10, b:40, l:40, r:10}, legend: {orientation:'h'} });

            // Defense Performance
            const perfTrace = {
                x: dates,
                y: dates.map(d => {
                    const day = histData.filter(x => x.date === d && x.bloc === "US/Israel Bloc");
                    const l = day.reduce((a,c) => a + (c.launched || 0), 0);
                    const i = day.reduce((a,c) => a + (c.intercepted || 0), 0);
                    return l > 0 ? (i/l)*100 : 0;
                }),
                name: 'Intercept %', type: 'scatter', line: {color: '#10b981', width: 3, shape: 'spline'}
            };
            Plotly.newPlot('performanceChart', [perfTrace], { margin: {t:10, b:40, l:40, r:10}, yaxis: {suffix: '%', range: [0, 105]} });

            // Bar Chart
            const barKeys = Object.keys(dailyData[0]).filter(k => !['day', 'Extrapolation'].includes(k));
            const dailyTraces = barKeys.map(k => ({ 
                x: dailyData.map(d => d.day), 
                y: dailyData.map(d => d[k]), 
                name: k, 
                type: 'bar' 
            }));
            Plotly.newPlot('dailyChart', dailyTraces, { barmode: 'stack', margin: {t:10, b:40, l:40, r:10}, legend: {orientation: 'h'} });
        }
        init();
    </script>
</body>
</html>
